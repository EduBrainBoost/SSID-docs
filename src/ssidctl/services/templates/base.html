<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Mission Control{% endblock %} — SSID EMS</title>
  <style>
    :root {
      --cyan: #00e5ff;
      --magenta: #ff2bd6;
      --green: #39ff14;
      --amber: #ffaa00;
      --bg-dark: #0a0a0f;
      --bg-card: rgba(15, 15, 25, 0.85);
      --bg-card-hover: rgba(25, 25, 40, 0.95);
      --border: rgba(0, 229, 255, 0.2);
      --text: #e0e0e0;
      --text-muted: #888;
      --font-mono: 'Courier New', Courier, monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
    }
    a { color: var(--cyan); text-decoration: none; }
    a:hover { text-decoration: underline; }
    nav {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    nav .logo {
      font-family: var(--font-mono);
      font-weight: bold;
      font-size: 1.1rem;
      color: var(--cyan);
      text-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
    }
    nav .links { display: flex; gap: 1.25rem; }
    nav .links a {
      color: var(--text-muted);
      font-size: 0.9rem;
      padding: 0.25rem 0;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    nav .links a:hover,
    nav .links a.active {
      color: var(--cyan);
      border-bottom-color: var(--cyan);
      text-decoration: none;
    }
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem;
    }
    h1 {
      font-family: var(--font-mono);
      color: var(--cyan);
      font-size: 1.5rem;
      margin-bottom: 1rem;
      text-shadow: 0 0 8px rgba(0, 229, 255, 0.3);
    }
    h2 {
      font-family: var(--font-mono);
      color: var(--magenta);
      font-size: 1.1rem;
      margin-bottom: 0.75rem;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 0.75rem;
      backdrop-filter: blur(8px);
      transition: background 0.2s, border-color 0.2s;
    }
    .card:hover {
      background: var(--bg-card-hover);
      border-color: var(--cyan);
    }
    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-family: var(--font-mono);
      font-weight: bold;
    }
    .badge-pass, .badge-done { background: rgba(57, 255, 20, 0.15); color: var(--green); }
    .badge-fail, .badge-blocked { background: rgba(255, 43, 214, 0.15); color: var(--magenta); }
    .badge-doing, .badge-review { background: rgba(0, 229, 255, 0.15); color: var(--cyan); }
    .badge-ready, .badge-backlog { background: rgba(255, 170, 0, 0.15); color: var(--amber); }
    .badge-cancelled { background: rgba(136, 136, 136, 0.15); color: var(--text-muted); }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0.75rem;
    }
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      text-align: center;
    }
    .stat-card .number {
      font-family: var(--font-mono);
      font-size: 2rem;
      color: var(--cyan);
      text-shadow: 0 0 12px rgba(0, 229, 255, 0.4);
    }
    .stat-card .label {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-top: 0.25rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    th {
      text-align: left;
      font-family: var(--font-mono);
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      padding: 0.5rem;
      font-size: 0.8rem;
      text-transform: uppercase;
    }
    td {
      padding: 0.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    tr:hover td { background: rgba(0, 229, 255, 0.03); }
    .meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }
    .empty {
      text-align: center;
      color: var(--text-muted);
      padding: 2rem;
      font-style: italic;
    }
    pre {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.75rem;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      overflow-x: auto;
      white-space: pre-wrap;
    }
    @media (max-width: 768px) {
      nav { flex-direction: column; gap: 0.5rem; }
      .grid { grid-template-columns: 1fr; }
      .stat-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="logo">&gt;_ MISSION CONTROL</a>
    <div class="links">
      <a href="/">Dashboard</a>
      <a href="/board">Board</a>
      <a href="/calendar">Calendar</a>
      <a href="/content">Content</a>
      <a href="/memory">Memory</a>
    </div>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
