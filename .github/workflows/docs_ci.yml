name: docs-ci
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm astro check

      - name: Build site
        run: pnpm build

      - name: Run tests
        run: pnpm test

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets
        run: |
          echo "=== Secret Pattern Scan ==="
          FAIL=0

          # Scan source files for credential patterns
          for pattern in \
            "PRIVATE.KEY" \
            "sk_live_" \
            "sk_test_" \
            "-----BEGIN.*KEY-----" \
            "ghp_[A-Za-z0-9_]" \
            "gho_[A-Za-z0-9_]" \
            "password\s*[:=]\s*['\"]" \
            "api[_-]key\s*[:=]\s*['\"]"; do
            if grep -rn "$pattern" \
              --include="*.ts" --include="*.js" --include="*.mjs" \
              --include="*.json" --include="*.md" --include="*.mdx" \
              --include="*.css" --include="*.yml" --include="*.yaml" \
              --include="*.svg" --include="*.html" \
              . 2>/dev/null | grep -v node_modules | grep -v pnpm-lock | grep -v "tests/security.test.mjs" | grep -v "tests/content.test.mjs" | grep -v "tools/ingest.mjs" | grep -v ".github/workflows/docs_ci.yml" | grep -v "src/content/docs/deployments/testnet-"; then
              echo "FAIL: Pattern '$pattern' found in source files!"
              FAIL=1
            fi
          done

          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi
          echo "PASS: No secrets detected"

  denylist-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for forbidden file types
        run: |
          echo "=== Forbidden File Type Scan ==="
          FAIL=0

          # Forbidden file extensions (never allowed in public docs repo)
          for ext in pem key p12 pfx jks keystore env; do
            if find . -name "*.${ext}" -not -path "./node_modules/*" -not -path "./.git/*" | grep -q .; then
              echo "FAIL: Forbidden file type .${ext} found:"
              find . -name "*.${ext}" -not -path "./node_modules/*" -not -path "./.git/*"
              FAIL=1
            fi
          done

          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi
          echo "PASS: No forbidden file types"

      - name: Check for forbidden paths
        run: |
          echo "=== Forbidden Path Scan ==="
          FAIL=0

          # Forbidden path patterns (SSID-internal structure must never appear)
          FORBIDDEN_PATHS=(
            "registry/.*internal"
          )

          for pattern in "${FORBIDDEN_PATHS[@]}"; do
            if find . -path "./node_modules" -prune -o -path "./.git" -prune -o -regex ".*${pattern}.*" -print | grep -q .; then
              echo "FAIL: Forbidden path pattern '${pattern}' found:"
              find . -path "./node_modules" -prune -o -path "./.git" -prune -o -regex ".*${pattern}.*" -print
              FAIL=1
            fi
          done

          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi
          echo "PASS: No forbidden paths"

      - name: Check for absolute local paths in content
        run: |
          echo "=== Absolute Path Leak Scan ==="
          FAIL=0

          # Block absolute local paths that leak private repo locations
          LEAK_PATTERNS=(
            'C:\\Users\\'
            'C:/Users/'
            '/home/.*Documents.*SSID'
            '/mnt/.*SSID'
            'Users/bibel'
          )

          for pattern in "${LEAK_PATTERNS[@]}"; do
            if grep -rn "$pattern" \
              --include="*.md" --include="*.mdx" --include="*.ts" \
              --include="*.js" --include="*.mjs" --include="*.json" \
              --include="*.yml" --include="*.yaml" --include="*.css" \
              . 2>/dev/null | grep -v node_modules | grep -v pnpm-lock | grep -v ".git/" | grep -v ".github/workflows/docs_ci.yml"; then
              echo "FAIL: Absolute local path leaked: '$pattern'"
              FAIL=1
            fi
          done

          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi
          echo "PASS: No absolute path leaks"

      - name: Check for private repo references in automation
        run: |
          echo "=== Private Repo Reference Scan ==="
          FAIL=0

          # No automation file should reference the private SSID repo.
          # Pattern definition files are excluded (ingest.mjs, docs_ci.yml, validate-ingest-source.yml).
          PRIVATE_PATTERNS=(
            "local.ssid"
            "local-ssid"
            "localSsid"
            "SSID[^-].*clone"
            "SSID[^-].*checkout"
            "sync.all"
            "mirror.repo"
            "export.repo"
            "rsync.*SSID[^-]"
            "robocopy.*SSID[^-]"
            "cp.*-r.*SSID[^-]"
            "git.subtree.*SSID[^-]"
            "git.filter-repo"
          )

          for pattern in "${PRIVATE_PATTERNS[@]}"; do
            if grep -rn "$pattern" \
              --include="*.ts" --include="*.js" --include="*.mjs" \
              --include="*.yml" --include="*.yaml" --include="*.sh" --include="*.ps1" \
              . 2>/dev/null | grep -v node_modules | grep -v pnpm-lock | grep -v "tests/security.test.mjs" | grep -v "tests/content.test.mjs" | grep -v "tools/ingest.mjs" | grep -v "tools/validate-ingest-source.mjs" | grep -v ".github/workflows/docs_ci.yml" | grep -v ".github/workflows/validate-ingest-source.yml"; then
              echo "FAIL: Private repo reference pattern '$pattern' found!"
              FAIL=1
            fi
          done

          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi
          echo "PASS: No private repo references"

  deployment-docs-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate deployment documentation exists
        run: |
          echo "=== Deployment Docs Presence Gate ==="
          FAIL=0

          # Required deployment documentation files
          REQUIRED_DOCS=(
            "src/content/docs/operations/local-stack.md"
            "src/content/docs/deployments/ports-matrix-current.mdx"
            "src/content/docs/deployments/testnet-guide.mdx"
            "src/content/docs/deployments/testnet-addresses.mdx"
            "src/content/docs/deployments/mainnet-readiness.mdx"
            "src/content/docs/governance/evidence-export.mdx"
          )

          for file in "${REQUIRED_DOCS[@]}"; do
            if [ ! -f "$file" ]; then
              echo "FAIL: Required file missing: $file"
              FAIL=1
            fi
          done

          # Verify files have content (not empty)
          for file in "${REQUIRED_DOCS[@]}"; do
            if [ -f "$file" ] && [ ! -s "$file" ]; then
              echo "FAIL: File is empty: $file"
              FAIL=1
            fi
          done

          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi
          echo "PASS: All deployment documentation files present"

  port-matrix-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate G-workspace ports (not C-ports)
        run: |
          echo "=== Port Matrix Validation Gate ==="
          FAIL=0

          # Files to check for correct port usage
          FILES_TO_CHECK=(
            "src/content/docs/operations/local-stack.md"
            "src/content/docs/deployments/ports-matrix-current.mdx"
            "src/content/docs/tooling/ems-control-plane.mdx"
            "src/content/docs/tooling/orchestrator-runtime.mdx"
          )

          # C-ports (production-only, should not appear in dev docs)
          C_PORTS=("localhost:3000" "localhost:8000" "3000" "8000")

          for file in "${FILES_TO_CHECK[@]}"; do
            if [ -f "$file" ]; then
              for port in "${C_PORTS[@]}"; do
                # Allow C-ports in ports-matrix-current.mdx (reference section)
                if [ "$file" != "src/content/docs/deployments/ports-matrix-current.mdx" ]; then
                  if grep -n "$port" "$file" | grep -v "node_modules" | grep -v "C-Canonical"; then
                    echo "FAIL: C-port $port found in $file (should use G-ports 3100/8100)"
                    FAIL=1
                  fi
                fi
              done
            fi
          done

          # Verify G-ports are documented
          for file in "${FILES_TO_CHECK[@]}"; do
            if [ -f "$file" ]; then
              if ! grep -q "3100\|8100" "$file"; then
                echo "WARN: G-ports not found in $file"
              fi
            fi
          done

          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi
          echo "PASS: Port matrix validation passed"
