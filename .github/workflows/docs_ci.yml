name: docs-ci
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm astro check

      - name: Build site
        run: pnpm build

      - name: Run tests
        run: pnpm test

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets
        run: |
          echo "=== Secret Pattern Scan ==="
          FAIL=0

          # Self-exclude: this workflow file contains pattern literals for scanning.
          # Excluding it prevents self-match false positives.
          SELF=".github/workflows/docs_ci.yml"

          for pattern in \
            "PRIVATE.KEY" \
            "sk_live_" \
            "sk_test_" \
            "-----BEGIN.*KEY-----" \
            "ghp_[A-Za-z0-9_]" \
            "gho_[A-Za-z0-9_]" \
            "password\s*[:=]\s*['\"]" \
            "api[_-]key\s*[:=]\s*['\"]"; do
            if grep -rn "$pattern" \
              --include="*.ts" --include="*.js" --include="*.mjs" \
              --include="*.json" --include="*.md" --include="*.mdx" \
              --include="*.css" --include="*.yml" --include="*.yaml" \
              --include="*.svg" --include="*.html" \
              --exclude="$SELF" \
              . 2>/dev/null \
              | grep -v node_modules \
              | grep -v pnpm-lock \
              | grep -vF "$SELF" \
              | grep -v "PUBLIC_POLICY.md" \
              | grep -v "tests/security.test.mjs" \
              | grep -v "tests/content.test.mjs" \
              | grep -v "tools/ingest.mjs"; then
              echo "FAIL: Pattern '$pattern' found in source files!"
              FAIL=1
            fi
          done

          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi
          echo "PASS: No secrets detected"

  denylist-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for forbidden file types
        run: |
          echo "=== Forbidden File Type Scan ==="
          FAIL=0

          # Forbidden file extensions (never allowed in public docs repo)
          for ext in pem key p12 pfx jks keystore env; do
            if find . -name "*.${ext}" -not -path "./node_modules/*" -not -path "./.git/*" | grep -q .; then
              echo "FAIL: Forbidden file type .${ext} found:"
              find . -name "*.${ext}" -not -path "./node_modules/*" -not -path "./.git/*"
              FAIL=1
            fi
          done

          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi
          echo "PASS: No forbidden file types"

      - name: Check for forbidden paths
        run: |
          echo "=== Forbidden Path Scan ==="
          FAIL=0

          FORBIDDEN_PATHS=(
            "registry/.*internal"
            "credential"
            "token.*secret"
            "\.env\."
          )

          for pattern in "${FORBIDDEN_PATHS[@]}"; do
            if find . -path "./node_modules" -prune -o -path "./.git" -prune -o -path "./02_audit_logging" -prune -o -regex ".*${pattern}.*" -print | grep -q .; then
              echo "FAIL: Forbidden path pattern '${pattern}' found:"
              find . -path "./node_modules" -prune -o -path "./.git" -prune -o -path "./02_audit_logging" -prune -o -regex ".*${pattern}.*" -print
              FAIL=1
            fi
          done

          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi
          echo "PASS: No forbidden paths"

      - name: Check for absolute local paths in content
        run: |
          echo "=== Absolute Path Leak Scan ==="
          FAIL=0

          # Self-exclude: this file contains pattern literals.
          SELF=".github/workflows/docs_ci.yml"

          LEAK_PATTERNS=(
            'C:\\Users\\'
            'C:/Users/'
            '/home/.*Documents.*SSID'
            '/mnt/.*SSID'
            'Users/bibel'
          )

          for pattern in "${LEAK_PATTERNS[@]}"; do
            if grep -rn "$pattern" \
              --include="*.md" --include="*.mdx" --include="*.ts" \
              --include="*.js" --include="*.mjs" --include="*.json" \
              --include="*.yml" --include="*.yaml" --include="*.css" \
              --exclude="$SELF" \
              . 2>/dev/null \
              | grep -v node_modules \
              | grep -v pnpm-lock \
              | grep -v ".git/" \
              | grep -vF "$SELF" \
              | grep -v "PUBLIC_POLICY.md"; then
              echo "FAIL: Absolute local path leaked: '$pattern'"
              FAIL=1
            fi
          done

          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi
          echo "PASS: No absolute path leaks"

      - name: Check for private repo references in automation
        run: |
          echo "=== Private Repo Reference Scan ==="
          FAIL=0

          # Self-exclude: this file contains pattern literals.
          SELF=".github/workflows/docs_ci.yml"

          PRIVATE_PATTERNS=(
            "local.ssid"
            "local-ssid"
            "localSsid"
            "SSID[^-].*clone"
            "SSID[^-].*checkout"
            "sync.all"
            "mirror.repo"
            "export.repo"
          )

          for pattern in "${PRIVATE_PATTERNS[@]}"; do
            if grep -rn "$pattern" \
              --include="*.ts" --include="*.js" --include="*.mjs" \
              --include="*.yml" --include="*.yaml" --include="*.sh" --include="*.ps1" \
              --exclude="$SELF" \
              . 2>/dev/null \
              | grep -v node_modules \
              | grep -v pnpm-lock \
              | grep -vF "$SELF" \
              | grep -v "tests/security.test.mjs"; then
              echo "FAIL: Private repo reference pattern '$pattern' found!"
              FAIL=1
            fi
          done

          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi
          echo "PASS: No private repo references"

  validate-ingest-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate ingest source is public-only
        run: |
          echo "=== Ingest Source Contract Validation ==="
          FAIL=0
          MANIFEST="tools/public_export_manifest.json"

          # 1. Manifest must exist
          if [ ! -f "$MANIFEST" ]; then
            echo "FAIL: $MANIFEST not found"
            exit 1
          fi
          echo "  OK: Manifest exists"

          # 2. Manifest must declare public-only policy
          if grep -q '"private_repos_allowed": true' "$MANIFEST"; then
            echo "FAIL: Manifest allows private repos!"
            FAIL=1
          fi
          echo "  OK: Manifest declares public-only"

          # 3. ingest.mjs must have required guards
          if ! grep -q "validateSourceIsPublic" tools/ingest.mjs; then
            echo "FAIL: ingest.mjs missing validateSourceIsPublic() call"
            FAIL=1
          fi
          echo "  OK: validateSourceIsPublic present"

          if ! grep -q "ALLOWED_PATHS" tools/ingest.mjs; then
            echo "FAIL: ingest.mjs missing ALLOWED_PATHS allowlist"
            FAIL=1
          fi
          echo "  OK: ALLOWED_PATHS present"

          if ! grep -q "BLOCKED_PATTERNS" tools/ingest.mjs; then
            echo "FAIL: ingest.mjs missing BLOCKED_PATTERNS blocklist"
            FAIL=1
          fi
          echo "  OK: BLOCKED_PATTERNS present"

          if ! grep -q "SECRET_PATTERNS" tools/ingest.mjs; then
            echo "FAIL: ingest.mjs missing SECRET_PATTERNS scan"
            FAIL=1
          fi
          echo "  OK: SECRET_PATTERNS present"

          # 4. Dangerous pattern scan is handled by tests/security.test.mjs
          #    (avoids false positives from pattern strings in CI files)

          if [ "$FAIL" -eq 0 ]; then
            echo "PASS: Ingest source contract validated (public-only)"
          else
            exit 1
          fi
