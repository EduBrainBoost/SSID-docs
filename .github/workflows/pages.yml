# Deploy Astro/Starlight site to GitHub Pages (main branch only).
#
# Triggers on push to main and manual dispatch.
# Builds with pnpm, uploads artifact, deploys to Pages.
# No secrets needed. No commits back to repo.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build

      - name: Verify base path (/SSID-docs)
        run: |
          echo "Checking dist/ for /SSID-docs/ references..."
          COUNT=$(grep -rl '/SSID-docs/' dist/ --include="*.html" 2>/dev/null | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "FAIL: No /SSID-docs/ base path found in dist/*.html — regression detected!"
            echo "Build output:"
            head -5 dist/index.html 2>/dev/null || echo "(no index.html)"
            exit 1
          fi
          echo "PASS: /SSID-docs/ base path confirmed in $COUNT HTML file(s)"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
