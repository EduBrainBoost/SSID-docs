name: "Phase P6: Documentation Build & Publish"

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'src/content/docs/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'src/content/docs/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'

env:
  EVIDENCE_DIR: .ssid-system/evidence/phase-p6

jobs:
  docs-build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Create evidence directory
        run: mkdir -p "${{ env.EVIDENCE_DIR }}"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build documentation (Astro/Starlight)
        id: build_docs
        run: |
          if [ -f "astro.config.mjs" ]; then
            pnpm build
            if [ $? -eq 0 ]; then
              echo "status=pass" >> $GITHUB_OUTPUT
            else
              echo "status=fail" >> $GITHUB_OUTPUT
              exit 1
            fi
          else
            echo "status=skip" >> $GITHUB_OUTPUT
          fi

      - name: Validate documentation links
        id: link_validation
        run: |
          node <<'EOF'
          const fs = require('node:fs');
          const path = require('node:path');

          const root = process.cwd();
          const sourceRoots = ['docs', 'src/content/docs']
            .map((dir) => path.join(root, dir))
            .filter((dir) => fs.existsSync(dir));
          const distRoot = path.join(root, 'dist');
          const markdownExtensions = ['', '.md', '.mdx'];
          const errors = [];

          function walk(dir) {
            const entries = fs.readdirSync(dir, { withFileTypes: true });
            const files = [];
            for (const entry of entries) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                files.push(...walk(full));
              } else if (entry.name.endsWith('.md') || entry.name.endsWith('.mdx')) {
                files.push(full);
              }
            }
            return files;
          }

          function existsAny(candidates) {
            return candidates.some((candidate) => fs.existsSync(candidate));
          }

          function resolveRelative(baseDir, target) {
            const raw = path.resolve(baseDir, target);
            const candidates = [];
            for (const ext of markdownExtensions) {
              candidates.push(raw + ext);
            }
            candidates.push(path.join(raw, 'index.md'));
            candidates.push(path.join(raw, 'index.mdx'));
            return existsAny(candidates);
          }

          function resolveAbsolute(target) {
            const clean = target.replace(/\/+$/, '');
            const relative = clean.replace(/^\/+/, '');
            if (!relative) {
              return fs.existsSync(path.join(distRoot, 'index.html'));
            }
            const direct = path.join(distRoot, relative);
            const candidates = [
              direct,
              direct + '.html',
              path.join(direct, 'index.html'),
            ];
            return existsAny(candidates);
          }

          const markdownFiles = sourceRoots.flatMap((dir) => walk(dir));
          const linkPattern = /\[[^\]]+\]\(([^)\s]+)(?:\s+"[^"]*")?\)/g;

          for (const file of markdownFiles) {
            const content = fs.readFileSync(file, 'utf8');
            const baseDir = path.dirname(file);
            const relFile = path.relative(root, file);
            for (const match of content.matchAll(linkPattern)) {
              const target = match[1].split('#')[0].split('?')[0].trim();
              if (!target) continue;
              if (
                target.startsWith('http://') ||
                target.startsWith('https://') ||
                target.startsWith('mailto:') ||
                target.startsWith('tel:') ||
                target.startsWith('#')
              ) {
                continue;
              }

              if (target.startsWith('/')) {
                if (!resolveAbsolute(target)) {
                  errors.push(`${relFile}: broken internal route ${target}`);
                }
                continue;
              }

              if (!resolveRelative(baseDir, target)) {
                errors.push(`${relFile}: missing relative target ${target}`);
              }
            }
          }

          if (errors.length > 0) {
            console.error(errors.join('\n'));
            process.exit(1);
          }
          EOF
          echo "status=pass" >> "$GITHUB_OUTPUT"

      - name: Check documentation coverage
        id: doc_coverage
        run: |
          TOTAL_DOCS=$(find docs src/content/docs \( -name "*.md" -o -name "*.mdx" \) 2>/dev/null | wc -l)
          echo "Total documentation files: $TOTAL_DOCS"

          if [ "$TOTAL_DOCS" -gt 0 ]; then
            echo "status=pass" >> $GITHUB_OUTPUT
          else
            echo "status=warn" >> $GITHUB_OUTPUT
          fi

      - name: Verify i18n translations
        id: i18n_check
        run: |
          # Check for at least one locale directory in the Starlight content tree.
          LANG_DIRS=0
          for dir in src/content/docs/*/; do
            if [ -d "$dir" ] && { [ -f "$dir/index.md" ] || [ -f "$dir/index.mdx" ]; }; then
              LANG_DIRS=$((LANG_DIRS + 1))
            fi
          done

          if [ "$LANG_DIRS" -ge 1 ]; then
            echo "status=pass" >> $GITHUB_OUTPUT
          else
            echo "status=warn" >> $GITHUB_OUTPUT
          fi

      - name: Check for API documentation
        id: api_docs
        run: |
          if [ -f "docs/api.md" ] || [ -f "docs/api.mdx" ] || [ -d "docs/api" ] || [ -d "src/content/docs/api" ]; then
            echo "status=pass" >> $GITHUB_OUTPUT
          else
            echo "status=skip" >> $GITHUB_OUTPUT
          fi

      - name: Verify build output
        id: build_output
        run: |
          if [ -d "dist" ]; then
            FILES=$(find dist -type f 2>/dev/null | wc -l)
            if [ "$FILES" -gt 0 ]; then
              echo "status=pass" >> $GITHUB_OUTPUT
            else
              echo "status=warn" >> $GITHUB_OUTPUT
            fi
          else
            echo "status=skip" >> $GITHUB_OUTPUT
          fi

      - name: Check search/indexing configuration
        id: search_config
        run: |
          # Starlight includes search by default
          if grep -q "search\|astro-expressive-code" astro.config.mjs 2>/dev/null; then
            echo "status=pass" >> $GITHUB_OUTPUT
          else
            echo "status=warn" >> $GITHUB_OUTPUT
          fi

      - name: Generate evidence artifact
        if: always()
        run: |
          cat > "${{ env.EVIDENCE_DIR }}/docs-build-$(date +%s).json" <<EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "repo": "SSID-docs",
            "phase": "P6",
            "check_name": "docs-build-publish",
            "checks": {
              "link_validation": "${{ steps.link_validation.outputs.status }}",
              "docs_build": "${{ steps.build_docs.outputs.status }}",
              "doc_coverage": "${{ steps.doc_coverage.outputs.status }}",
              "i18n_translations": "${{ steps.i18n_check.outputs.status }}",
              "api_documentation": "${{ steps.api_docs.outputs.status }}",
              "build_output": "${{ steps.build_output.outputs.status }}",
              "search_config": "${{ steps.search_config.outputs.status }}"
            },
            "overall_status": "${{ job.status }}"
          }
          EOF

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-p6-docs-build
          path: ${{ env.EVIDENCE_DIR }}/
          retention-days: 90

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: docs-build-dist
          path: dist/
          retention-days: 7

